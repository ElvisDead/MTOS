<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTOS</title>

<style>

body{
    background:#0a0a0a;
    color:#eee;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

#controls{
    margin:20px;
}

input{
    padding:8px;
    margin:5px;
    background:#111;
    border:1px solid #333;
    color:#fff;
}

button{
    padding:10px 20px;
    background:#222;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#444;
}

#status{
    margin-top:10px;
    color:#aaa;
}

.section{
    margin-top:40px;
}

</style>

</head>
<body>

<h1>MTOS</h1>

<div id="controls">

<input id="name" placeholder="Name">
<input id="year" placeholder="Year">
<input id="month" placeholder="Month">
<input id="day" placeholder="Day">

<br>

<button id="runBtn">RUN</button>

<div id="status">init...</div>

</div>

<div class="section">
<h2>260 Kin Cognitive Weather</h2>
<div id="weatherMap"></div>
</div>

<div class="section">
<h2>Global Kin Distribution</h2>
<div id="globalKinMap"></div>
</div>

<div class="section">
<h2>Linear Kin Distribution</h2>
<div id="linearKinMap"></div>
</div>

<div class="section">
<h2>Phase Space</h2>
<div id="phaseMap"></div>
</div>

<div class="section">
<h2>Pressure Map</h2>
<div id="pressureMap"></div>
</div>

<div class="section">
<h2>Gradient Map</h2>
<div id="gradientMap"></div>
</div>

<script type="module">

import { drawGlobalKinMap } from "./globalKinMap.js"
import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"

let pyodide = null

async function init(){

    document.getElementById("status").innerText = "Loading Pyodide..."

    pyodide = await loadPyodide()

    const code = await (await fetch("MTOS_Engine.py")).text()

    pyodide.runPython(code)

    document.getElementById("status").innerText = "Ready"
}

async function run(){

    const name = document.getElementById("name").value
    const year = +document.getElementById("year").value
    const month = +document.getElementById("month").value
    const day = +document.getElementById("day").value

    document.getElementById("status").innerText = "Running..."

    try{

        pyodide.runPython(`
run_mtos("${name}",${year},${month},${day})
`)

        // GLOBAL MAP (пока только она)
        const kinCounts = JSON.parse(
            pyodide.runPython(`mtos_global_kin_map()`)
        )

        const usersByKin = JSON.parse(
            pyodide.runPython(`mtos_users_by_kin()`)
        )

        drawGlobalKinMap("globalKinMap", kinCounts, usersByKin)

        document.getElementById("status").innerText = "Done"

    }catch(e){

        console.error(e)
        document.getElementById("status").innerText = "ERROR"

    }
}

document.getElementById("runBtn").onclick = run

init()

</script>

</body>
</html>
