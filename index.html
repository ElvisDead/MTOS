<style>

#app {
    position: relative;
    z-index: 1;
}
    
body {
    margin: 0;
    background: black;
    position: relative;
}

/* общий класс */
.mayan-border {
    position: fixed;
    top: 0;
    height: 100vh;
    width: 140px;

    background-repeat: repeat-y;
    background-size: contain;

    z-index: 0;
    pointer-events: none;
}

/* левая */
.mayan-left {
    left: 0;
    background-image: url("./mayan-left.png");
    background-position: left top;
}

/* правая */
.mayan-right {
    right: 0;
    background-image: url("./mayan-left.png");
    background-position: right top;
}
</style>

<style>

.mayan-card {
    position: relative;
    max-width: 980px;
    margin: 18px auto;
    padding: 18px 56px;
    box-sizing: border-box;
    background: #000;
    border: 1px solid #222;
    overflow: hidden;
}

.mayan-card::before,
.mayan-card::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 42px;
    background-image: url("./mayan-left.png");
    background-repeat: repeat-y;
    background-size: 42px auto;
    opacity: 0.95;
    pointer-events: none;
}

.mayan-card::before {
    left: 0;
}

.mayan-card::after {
    right: 0;
    transform: scaleX(-1);
}

/* чтобы карты не расползались */
#seriesBlock,
#networkMap,
#collective {
    max-width: 860px;
    margin: 0 auto;
}

#weatherMap{
    max-width: 1100px;
    margin: 0 auto;
    overflow-x: auto;
}

.today-card{
    max-width:800px;
    margin:20px auto;
    padding:20px;
    border:1px solid #333;
    background:#050505;
    border-radius:12px;
}

.today-top{
    display:flex;
    justify-content:space-between;
    gap:20px;
}

.today-user, .today-day{
    flex:1;
    padding:12px;
    border:1px solid #222;
    border-radius:8px;
    background:#000;
}

.label{
    font-size:11px;
    color:#666;
    margin-bottom:6px;
}

.value{
    font-size:16px;
    color:#fff;
}

.today-state{
    margin-top:20px;
    padding:14px;
    border:1px solid #222;
    border-radius:8px;
    background:#000;
}

.state-main{
    font-size:22px;
    font-weight:bold;
    color:#00ff88;
}

.state-sub{
    font-size:12px;
    color:#888;
    margin-top:6px;
}

</style>

<script type="module">
import { initMTOS, runMTOS } from "./js/main.js"
import { replaySeek } from "./js/replay.js"

window.initMTOS = initMTOS
window.runMTOS = runMTOS
window.replaySeek = replaySeek

window.showMTOSLogs = function(){
    const panel = document.getElementById("logPanel")
    if(panel) panel.style.display = "block"
}

window.hideMTOSLogs = function(){
    const panel = document.getElementById("logPanel")
    if(panel) panel.style.display = "none"
}

window.clearMTOSLogs = function(){
    localStorage.removeItem("mtos_log")
    window.MTOS_LOG = []

    const logStream = document.getElementById("logStream")
    if(logStream) logStream.innerHTML = ""

    const snapshotStream = document.getElementById("snapshotStream")
    if(snapshotStream) snapshotStream.innerHTML = ""
}

window.showDailySnapshots = function(){
    const panel = document.getElementById("snapshotPanel")
    const stream = document.getElementById("snapshotStream")

    if(panel) panel.style.display = "block"
    if(!stream) return

    let rows = []
    try{
        rows = JSON.parse(localStorage.getItem("mtos_daily_snapshots") || "[]")
        if(!Array.isArray(rows)) rows = []
    }catch(e){
        rows = []
    }

    if(!rows.length){
        stream.innerHTML = '<div style="color:#888;">No daily snapshots yet</div>'
        return
    }

    stream.innerHTML = rows
        .slice()
        .reverse()
        .map(row => {
            return `
                <div style="padding:8px 0;border-bottom:1px solid #111;">
                    <div><b>${row.day || "?"}</b> · ${row.name || "?"}</div>
                    <div>userKin: ${row.userKin ?? "?"} · todayKin: ${row.todayKin ?? "?"}</div>
                    <div>mode: ${row.recommendedMode ?? "?"} · label: ${row.dayLabel ?? "?"}</div>
                    <div>attention: ${Number(row.attention ?? 0).toFixed(2)} · entropy: ${Number(row.entropy ?? 0).toFixed(2)} · predictability: ${Number(row.predictability ?? 0).toFixed(2)}</div>
                </div>
            `
        })
        .join("")
}

initMTOS()
</script>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<script>
window.applyStaticTranslations = function(){
    document.querySelectorAll("[data-i18n]").forEach(el=>{

            el.placeholder = t(key)
        } else {
            el.innerText = t(key)
        }
    })
}
</script>

</script>
