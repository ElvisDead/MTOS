<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MTOS</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body{
font-family: Arial;
background:#111;
color:#eee;
text-align:center;
padding:40px;
}
input{
padding:10px;
margin:5px;
font-size:18px;
}
button{
padding:10px 20px;
font-size:18px;
}
#output{
margin-top:30px;
white-space:pre-wrap;
text-align:left;
max-width:700px;
margin:auto;
}
</style>
</head>

<body>

<h1>MTOS</h1>

<p>Name</p>
<input id="name">

<p>Birth date</p>
<input id="year" placeholder="year">
<input id="month" placeholder="month">
<input id="day" placeholder="day">

<br><br>

<button onclick="run()">Run MTOS</button>

<div id="output"></div>

<script>

async function run(){

let pyodide = await loadPyodide()

let name = document.getElementById("name").value
let year = document.getElementById("year").value
let month = document.getElementById("month").value
let day = document.getElementById("day").value

let engine = await fetch("MTOS_Engine_v1.2.py").then(r => r.text())

pyodide.runPython(engine)

let code = `
name="${name}"
year=${year}
month=${month}
day=${day}

run_mtos(name,year,month,day)
`

let result = pyodide.runPython(code)

document.getElementById("output").innerText=result

}

</script>

</body>
</html>
