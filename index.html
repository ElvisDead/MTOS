<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MTOS Engine</title>

    <!-- BASIC STYLE -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #eaeaea;
        }

        #app {
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .controls {
            margin-bottom: 20px;
        }

        input, button {
            padding: 8px;
            margin-right: 5px;
        }

        canvas {
            border: 1px solid #333;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .panel {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="app">

    <h1>MTOS Engine</h1>

    <div class="controls">
        <input id="name" placeholder="Name">
        <input id="year" type="number" placeholder="Year">
        <input id="month" type="number" placeholder="Month">
        <input id="day" type="number" placeholder="Day">
        <button id="runBtn">Run</button>
    </div>

    <div class="grid">

        <div class="panel">
            <h3>Kin Map</h3>
            <canvas id="kinMap" width="300" height="300"></canvas>
        </div>

        <div class="panel">
            <h3>Linear Map</h3>
            <canvas id="linearMap" width="600" height="150"></canvas>
        </div>

        <div class="panel">
            <h3>Heatmap</h3>
            <canvas id="heatmap" width="300" height="300"></canvas>
        </div>

        <div class="panel">
            <h3>Global Kin Distribution</h3>
            <canvas id="globalKinMap" width="600" height="150"></canvas>
        </div>

        <div class="panel">
            <h3>Phase Space</h3>
            <canvas id="phaseSpace" width="300" height="300"></canvas>
        </div>

        <div class="panel">
            <h3>Charts</h3>
            <canvas id="charts" width="600" height="200"></canvas>
        </div>

    </div>

</div>

<!-- PYODIDE -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<!-- CORE SYSTEM -->
<script type="module">

import { loadPyodideAndRun } from './pyodideLoader.js';
import { initApp } from './main.js';

async function boot() {

    console.log("Loading Pyodide...");

    const pyodide = await loadPyodideAndRun('./MTOS_Engine.py');

    console.log("Pyodide ready");

    initApp(pyodide);

}

boot();

</script>

</body>
</html>
