<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTOS</title>

<style>
body{
    background:#0a0a0a;
    color:#eee;
    font-family:Arial;
    text-align:center;
}

input{
    padding:8px;
    margin:5px;
    background:#111;
    border:1px solid #333;
    color:#fff;
}

button{
    padding:10px 20px;
    background:#222;
    color:#fff;
    border:none;
    cursor:pointer;
}

.section{
    margin-top:40px;
}

#status{
    margin-top:10px;
    color:#aaa;
}
</style>

</head>
<body>

<h1>MTOS Scientific Dashboard</h1>

<div>

<input id="name" placeholder="Name">
<input id="year" placeholder="Year">
<input id="month" placeholder="Month">
<input id="day" placeholder="Day">

<br>

<button id="runBtn">RUN</button>

<div id="status">init...</div>

</div>

<div class="section">
<h2>260 Kin Cognitive Weather</h2>
<div id="weatherMap"></div>
</div>

<div class="section">
<h2>Global Kin Distribution</h2>
<div id="globalKinMap"></div>
</div>

<script type="module">

import { initMTOS, runMTOS } from "./js/main.js"

document.getElementById("runBtn").onclick = runMTOS

initMTOS()

</script>

</body>
</html>
