<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTOS FULL SYSTEM</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

input{
    width:120px;
    padding:5px;
    margin:5px;
}

button{
    padding:6px 12px;
    margin-top:10px;
    cursor:pointer;
}

.section{
    margin-top:40px;
}

canvas{
    background:#111;
}

#networkMap{
    margin-top:20px;
}
</style>
</head>

<body onload="initMTOS()">

<h1>MTOS FULL SYSTEM</h1>

<!-- INPUT -->
<div>
    <input id="name" placeholder="Name">
    <input id="year" placeholder="Year">
    <input id="month" placeholder="Month">
    <input id="day" placeholder="Day">
</div>

<!-- RUN -->
<div>
    <button onclick="runMTOS()">RUN</button>
</div>

<!-- TIME CONTROLS -->
<div id="timeControls" style="margin-top:10px;"></div>

<!-- STATUS -->
<div id="status" style="margin-top:5px;">Idle</div>

<!-- SUMMARY -->
<div id="mtosSummary" style="
    margin:20px;
    text-align:center;
    font-family:monospace;
    line-height:1.6;
"></div>

<!-- WEATHER -->
<div class="section">
    <h2>Weather</h2>
    <div id="weatherMap"></div>
</div>

<!-- NETWORK -->
<div class="section">
    <h2>Network</h2>
    <div id="networkMap"></div>
</div>

<!-- SERIES -->
<div class="section">
    <h2>Series</h2>
    <div id="seriesMap"></div>
</div>

<!-- PHASE SPACE -->
<div class="section">
    <h2>Phase Space</h2>
    <div id="phaseMap"></div>
</div>

<!-- ATTRACTOR -->
<div class="section">
    <h2>Attractor</h2>
    <div id="attractorMap"></div>
</div>

<!-- COLLECTIVE -->
<div class="section">
    <h2>Collective</h2>
    <div id="collectiveMap"></div>
</div>

<!-- ACTIVITY -->
<div class="section">
    <h2>Activity</h2>
    <div id="activityMap"></div>
</div>

<!-- SCRIPTS -->
<script type="module">
import { initMTOS, runMTOS } from "./js/main.js"

window.initMTOS = initMTOS
window.runMTOS = runMTOS
</script>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

</body>
</html>
