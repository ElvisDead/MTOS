<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MTOS</title>

<style>

body{
    background:#0a0a0a;
    color:#eee;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

#app{
    margin-top:30px;
}

input{
    padding:10px;
    margin:5px;
    background:#111;
    border:1px solid #333;
    color:#fff;
}

button{
    padding:10px 20px;
    margin-top:10px;
    background:#222;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#444;
}

#status{
    margin-top:20px;
    color:#aaa;
}

#output{
    margin-top:20px;
}

</style>

</head>

<body>

<h1>MTOS</h1>

<div id="app">

<input id="name" placeholder="Имя"><br>
<input id="year" placeholder="Год"><br>
<input id="month" placeholder="Месяц"><br>
<input id="day" placeholder="День"><br>

<button id="runBtn">RUN</button>

<div id="status">готов</div>

<div id="output"></div>

<div id="globalKinMap"></div>

</div>

<script type="module">

import { drawGlobalKinMap } from "./globalKinMap.js"

import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"

let pyodide = null

async function init(){

    document.getElementById("status").innerText = "Loading Pyodide..."

    pyodide = await loadPyodide()

    const response = await fetch("MTOS_Engine.py")
    const code = await response.text()

    pyodide.runPython(code)

    document.getElementById("status").innerText = "Ready"

}

async function run(){

    const name = document.getElementById("name").value
    const year = parseInt(document.getElementById("year").value)
    const month = parseInt(document.getElementById("month").value)
    const day = parseInt(document.getElementById("day").value)

    document.getElementById("status").innerText = "Running..."

    try{

        const result = pyodide.runPython(`
import json
run_mtos("${name}",${year},${month},${day})
`)

        const data = JSON.parse(result)

        document.getElementById("output").innerText = JSON.stringify(data,null,2)

        document.getElementById("status").innerText = "Done"

    }catch(e){

        document.getElementById("status").innerText = "Error"
        console.error(e)

    }

}

document.getElementById("runBtn").onclick = run

init()

</script>

</body>
</html>
