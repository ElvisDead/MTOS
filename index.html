<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTOS Scientific Dashboard</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{
    background:#111;
    color:#eee;
    font-family:Arial;
    text-align:center;
}

.container{
    margin:40px auto;
    width:800px;
}

input{
    width:120px;
    padding:8px;
    margin:5px;
    background:#222;
    color:#eee;
    border:1px solid #555;
}

button{
    padding:10px 20px;
    background:#444;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#666;
}

.map{
    margin:30px auto;
    width:700px;
}
</style>
</head>

<body>

<h1>MTOS Dashboard</h1>

<div class="container">
    <input id="name" placeholder="Name">
    <input id="year" placeholder="Year">
    <input id="month" placeholder="Month">
    <input id="day" placeholder="Day">
    <br>
    <button id="runBtn">RUN</button>
    <div id="status">init...</div>
</div>

<h2>Weather</h2>
<div id="weatherMap" class="map"></div>

<h2>Global Kin</h2>
<div id="globalKinMap" class="map"></div>

<h2>Pressure</h2>
<div id="pressureMap" class="map"></div>

<script type="module">
import { initMTOS, runMTOS } from "./js/main.js"
document.getElementById("runBtn").onclick = runMTOS
initMTOS()
</script>

</body>
</html>
