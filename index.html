<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>MTOS — Metabolic Tzolkin Operating System</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#111;
color:#eee;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:5px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

section{
margin-top:50px;
}

#output{
margin-top:30px;
white-space:pre-wrap;
text-align:left;
max-width:700px;
margin:auto;
}

#kinmap{
width:520px;
margin:auto;
}

.cell{
width:10px;
height:10px;
display:inline-block;
margin:1px;
}

canvas{
background:#000;
margin-top:20px;
}

</style>

</head>

<body>

<h1>MTOS</h1>
<h3>Metabolic Tzolkin Operating System</h3>

<section>

<p>Name</p>
<input id="name">

<p>Birth date</p>
<input id="year" placeholder="year">
<input id="month" placeholder="month">
<input id="day" placeholder="day">

<br><br>

<button onclick="run()">Run MTOS</button>

</section>

<section>

<h2>MTOS Result</h2>
<div id="output"></div>

</section>

<section>

<h2>Attention Forecast (30 Days)</h2>
<canvas id="chart" width="700" height="300"></canvas>

</section>

<section>

<h2>260 Kin Cognitive Climate</h2>
<div id="kinmap"></div>

</section>

<section>

<h2>Global Cognitive Weather Map</h2>
<canvas id="atlas" width="500" height="500"></canvas>

</section>

<section>

<h2>User Interaction Network</h2>
<div id="network"></div>

</section>

<script>

let pyodideReadyPromise = loadPyodide()

async function run(){

const pyodide = await pyodideReadyPromise

await pyodide.loadPackage("numpy")

let name = document.getElementById("name").value
let year = parseInt(document.getElementById("year").value)
let month = parseInt(document.getElementById("month").value)
let day = parseInt(document.getElementById("day").value)

document.getElementById("output").innerText="Loading MTOS..."

let engine = await fetch("MTOS_Engine.py").then(r=>r.text())

pyodide.runPython(engine)

pyodide.globals.set("name",name)
pyodide.globals.set("year",year)
pyodide.globals.set("month",month)
pyodide.globals.set("day",day)

let result = pyodide.runPython(`
run_mtos(name,year,month,day)
`)

document.getElementById("output").innerText=result

let series = pyodide.runPython(`
mtos_series(name,year,month,day)
`)

drawChart(series)
drawKinMap(series)
drawAtlas()
drawNetwork()

}

function drawChart(series){

let ctx=document.getElementById("chart")

new Chart(ctx,{
type:"line",
data:{
labels:series.map((_,i)=>i+1),
datasets:[{
label:"Attention",
data:series,
borderColor:"cyan",
fill:false
}]
},
options:{
scales:{
y:{min:0,max:1}
}
}
})

}

function drawKinMap(series){

let container=document.getElementById("kinmap")

container.innerHTML=""

for(let i=0;i<260;i++){

let v=Math.random()

let color="green"

if(v<0.35) color="red"
else if(v<0.55) color="orange"
else if(v<0.75) color="yellow"

let cell=document.createElement("div")

cell.className="cell"
cell.style.background=color

container.appendChild(cell)

}

}

function drawAtlas(){

let canvas=document.getElementById("atlas")
let ctx=canvas.getContext("2d")

let size=20
let cell=25

for(let y=0;y<size;y++){

for(let x=0;x<size;x++){

let v=Math.random()

let color="blue"

if(v>0.7) color="green"
if(v<0.3) color="red"

ctx.fillStyle=color
ctx.fillRect(x*cell,y*cell,cell,cell)

}

}

}

function drawNetwork(){

let users=["Alice","Bob","Eve","Mark"]

let container=document.getElementById("network")

container.innerHTML=""

for(let i=0;i<users.length;i++){

for(let j=i+1;j<users.length;j++){

let r=Math.random()

let relation="NEUTRAL"

if(r>0.65) relation="COLLABORATE"
if(r<0.3) relation="CONFLICT"

let line=document.createElement("div")

line.innerText=users[i]+" ↔ "+users[j]+" : "+relation

container.appendChild(line)

}

}

}

</script>

</body>
</html>
