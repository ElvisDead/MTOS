<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MTOS</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body{
font-family: Arial;
background:#111;
color:#eee;
text-align:center;
padding:40px;
}
input{
padding:10px;
margin:5px;
font-size:18px;
}
button{
padding:10px 20px;
font-size:18px;
}
#output{
margin-top:30px;
white-space:pre-wrap;
text-align:left;
max-width:700px;
margin:auto;
}
</style>
</head>

<body>

<h1>MTOS</h1>

<p>Name</p>
<input id="name">

<p>Birth date</p>
<input id="year" placeholder="year">
<input id="month" placeholder="month">
<input id="day" placeholder="day">

<br><br>

<button onclick="run()">Run MTOS</button>

<div id="output"></div>

<script>

let pyodideReadyPromise = loadPyodide();

async function run(){

const pyodide = await pyodideReadyPromise;

// загрузка numpy
await pyodide.loadPackage("numpy")

let name = document.getElementById("name").value
let year = parseInt(document.getElementById("year").value)
let month = parseInt(document.getElementById("month").value)
let day = parseInt(document.getElementById("day").value)

document.getElementById("output").innerText="Loading MTOS..."

let engine = await fetch("MTOS_Engine.py").then(r=>r.text())

pyodide.runPython(engine)

pyodide.globals.set("name",name)
pyodide.globals.set("year",year)
pyodide.globals.set("month",month)
pyodide.globals.set("day",day)

let result = pyodide.runPython(`
run_mtos(name,year,month,day)
`)

document.getElementById("output").innerText=result

}

</script>
</body>
</html>
