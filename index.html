<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTOS SYSTEM</title>
<link rel="icon" type="image/png" href="favicon.png">

<script src="./js/lang.js"></script>

<style>
:root{
    --bg:#000000;
    --bg-soft:#050505;
    --bg-card:#060606;
    --bg-card-2:#0a0a0a;
    --line:#222222;
    --line-soft:rgba(255,255,255,0.08);
    --text:#ffffff;
    --text-soft:#d7dee8;
    --text-dim:#9ca3af;
    --text-muted:#7f8792;
    --green:#00ff88;
    --green-soft:rgba(0,255,136,0.12);
    --yellow:#ffd250;
    --shadow:0 16px 40px rgba(0,0,0,0.35);
    --radius:18px;
    --radius-sm:12px;
    --radius-lg:22px;
    --content-width:1180px;
    --panel-width:980px;
    --panel-width-narrow:860px;
}

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
}

body{
    position:relative;
    text-align:center;
}

button,
input{
    font-family:inherit;
}

button{
    cursor:pointer;
}

#app{
    position:relative;
    z-index:1;
}

/* MAYAN SIDE BORDERS */
.mayan-border{
    position:fixed;
    top:0;
    height:100vh;
    width:140px;
    background-repeat:repeat-y;
    background-size:contain;
    z-index:0;
    pointer-events:none;
}

.mayan-left{
    left:0;
    background-image:url("./mayan-left.png");
    background-position:left top;
}

.mayan-right{
    right:0;
    background-image:url("./mayan-left.png");
    background-position:right top;
}

/* APP SHELL */
.app-shell{
    width:min(var(--content-width), calc(100vw - 80px));
    margin:0 auto;
    padding:20px 0 40px;
}

/* HEADER */
.topbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    margin-top:12px;
    margin-bottom:20px;
}

.mtos-header{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:10px;
}

.mtos-logo{
    width:560px;
    height:560px;
    display:block;
    object-fit:contain;
}

.mtos-about{
    width:min(760px, 92vw);
    margin:8px auto 14px;
    padding:18px 22px;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:18px;
    background:linear-gradient(180deg, rgba(10,12,18,0.92) 0%, rgba(6,8,12,0.96) 100%);
    box-shadow:0 12px 34px rgba(0,0,0,0.22);
    text-align:left;
}

.mtos-about-title{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:#7f8792;
    margin-bottom:12px;
}

.mtos-about-text{
    display:grid;
    gap:10px;
    font-size:15px;
    line-height:1.7;
    color:#d7dee8;
}

.mtos-about-text b{
    color:#ffffff;
    font-weight:700;
}

@media (max-width: 560px){
    .mtos-about{
        width:min(94vw, 100%);
        padding:14px 16px;
        border-radius:16px;
    }

    .mtos-about-text{
        font-size:14px;
        line-height:1.6;
    }
}

.controls-panel{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    width:100%;
}

.controls-panel input{
    width:150px;
    min-width:120px;
    padding:12px 14px;
    border:1px solid #2a2a2a;
    background:#dfe4ee;
    color:#111;
    font-size:22px;
}

.controls-panel button{
    padding:12px 18px;
    border:1px solid #444;
    background:#efefef;
    color:#111;
    font-size:16px;
}

.view-switch,
.lang-switch{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin:4px 0 8px;
}

.view-switch button,
.lang-switch button{
    padding:10px 16px;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px;
    background:rgba(255,255,255,0.04);
    color:#dbe2ea;
    font-size:13px;
    letter-spacing:0.08em;
    transition:all 0.16s ease;
}

.view-switch button.active{
    background:linear-gradient(90deg, rgba(0,255,136,0.90), rgba(110,255,190,0.86));
    color:#04110d;
    border-color:transparent;
    box-shadow:0 0 20px rgba(0,255,136,0.20);
}

.lang-switch button.active{
    background:linear-gradient(90deg, rgba(255,210,80,0.90), rgba(255,160,80,0.86));
    color:#111;
    border-color:transparent;
    box-shadow:0 0 20px rgba(255,210,80,0.20);
}

/* GENERIC PANELS */
.mayan-card{
    position:relative;
    max-width:var(--panel-width);
    margin:18px auto;
    padding:18px 42px;
    background:#000;
    border:1px solid var(--line);
    overflow:hidden;
}

.mayan-card::before,
.mayan-card::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:42px;
    background-image:url("./mayan-left.png");
    background-repeat:repeat-y;
    background-size:42px auto;
    opacity:0.95;
    pointer-events:none;
}

.mayan-card::before{
    left:0;
}

.mayan-card::after{
    right:0;
    transform:scaleX(-1);
}

.section-title,
.weather-title{
    font-size:12px;
    letter-spacing:0.16em;
    color:var(--text-muted);
    text-transform:uppercase;
    margin-bottom:14px;
}

/* HERO / TODAY */
.hero-panel{
    max-width:var(--panel-width);
    margin:0 auto 18px;
    padding:18px 22px;
    border:1px solid #262626;
    border-radius:16px;
    background:linear-gradient(180deg, #060606 0%, #0a0a0a 100%);
}

#todayPanel{
    display:none;
}

/* HUMAN LAYER */
#humanLayer{
    max-width:var(--panel-width);
    margin:18px auto;
    padding:18px 56px;
}

.human-shell{
    padding:18px 28px;
}

.human-layer{
    max-width:var(--panel-width-narrow);
    margin:0 auto;
    text-align:left;
}

.human-grid{
    display:grid;
    grid-template-columns:1.15fr 0.85fr;
    gap:14px;
}

.human-box{
    border:1px solid #262626;
    border-radius:14px;
    background:#060606;
    padding:16px;
}

.human-box-title{
    font-size:11px;
    letter-spacing:0.10em;
    color:#7f7f7f;
    margin-bottom:8px;
}

.human-main{
    font-size:26px;
    font-weight:700;
    color:#fff;
    line-height:1.15;
}

.human-why{
    font-size:14px;
    color:#c7c7c7;
    line-height:1.6;
    margin-top:10px;
}

.human-bars{
    display:grid;
    gap:12px;
}

.human-bar-row{
    display:grid;
    grid-template-columns:110px 1fr 52px;
    gap:10px;
    align-items:center;
}

.human-bar-label{
    font-size:13px;
    color:#d1d5db;
}

.human-bar-track{
    width:100%;
    height:10px;
    border-radius:999px;
    background:#111827;
    overflow:hidden;
    border:1px solid #1f2937;
}

.human-bar-fill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg, #334155 0%, #00ff88 100%);
}

.human-bar-fill.pressure{
    background:linear-gradient(90deg, #334155 0%, #ff9f43 100%);
}

.human-bar-fill.stability{
    background:linear-gradient(90deg, #334155 0%, #66ccff 100%);
}

.human-bar-value{
    text-align:right;
    font-size:12px;
    color:#9ca3af;
}

.human-history{
    display:grid;
    gap:8px;
    margin-top:6px;
}

.human-history-row{
    display:grid;
    grid-template-columns:90px 1fr auto;
    gap:10px;
    align-items:center;
    padding:8px 10px;
    border:1px solid #1f1f1f;
    border-radius:10px;
    background:#040404;
}

.human-history-date{
    font-size:12px;
    color:#9ca3af;
}

.human-history-state{
    font-size:13px;
    color:#f3f4f6;
}

.human-history-mode{
    font-size:11px;
    color:#8b8b8b;
}

.human-feedback{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
}

.human-feedback button{
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #333;
    background:#0a0a0a;
    color:#fff;
    font-size:13px;
}

.human-feedback button.active{
    border-color:#00ff88;
    box-shadow:0 0 0 1px rgba(0,255,136,0.25) inset;
}

.human-feedback-note{
    margin-top:10px;
    font-size:12px;
    color:#8b8b8b;
    line-height:1.5;
}

/* LITE / TOP CARDS */
.mtos-lite-direction{
    opacity:0.82;
    font-style:italic;
}

.mtos-lite-summary{
    margin-bottom:10px;
    font-size:18px;
    font-weight:700;
    line-height:1.4;
    color:#f3f4f6;
}

.mtos-lite-meaning{
    opacity:0.92;
    font-size:16px;
    line-height:1.6;
    color:#d7dee8;
}

.mtos-lite-interpretation{
    max-width:860px;
    margin:0 auto;
}

.mtos-lite-grid{
    display:grid;
    grid-template-columns:1.2fr 0.8fr;
    gap:14px;
}

.mtos-top-cards{
    display:grid !important;
    grid-template-columns:repeat(4, minmax(0, 1fr)) !important;
    gap:12px;
    margin-bottom:16px;
    align-items:stretch;
    grid-auto-rows:1fr;
}

.mtos-card{
    min-width:0;
    min-height:220px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.mtos-lite-block{
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    background:linear-gradient(180deg, rgba(10,12,18,0.96) 0%, rgba(7,9,13,0.98) 100%);
    padding:16px 18px;
    text-align:left;
}

.mtos-card-label,
.mtos-lite-label{
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#7f8792;
    margin-bottom:10px;
}

.mtos-card-value{
    font-size:20px;
    font-weight:800;
    line-height:1.2;
    color:#00ff9c;
    margin-bottom:10px;
    word-break:break-word;
    overflow-wrap:anywhere;
}

.mtos-card-sub{
    font-size:15px;
    line-height:1.5;
    opacity:0.92;
    color:#d7dee8;
    word-break:break-word;
}

.mtos-lite-title{
    font-size:22px;
    font-weight:800;
    line-height:1.15;
    color:#fff;
    margin-bottom:10px;
}

.mtos-lite-text{
    display:grid;
    gap:8px;
    font-size:17px;
    line-height:1.55;
    color:#f3f4f6;
}

.mtos-lite-line{
    display:block;
}

/* WEATHER */
.weather-shell{
    border-color:rgba(255,255,255,0.10);
    background:
        radial-gradient(circle at 12% 100%, rgba(0,255,136,0.06), transparent 24%),
        radial-gradient(circle at 88% 100%, rgba(255,210,80,0.06), transparent 22%),
        linear-gradient(180deg, rgba(8,10,14,0.98) 0%, rgba(3,5,8,1) 100%);
    box-shadow:
        0 20px 60px rgba(0,0,0,0.40),
        inset 0 0 0 1px rgba(255,255,255,0.02);
}

#weatherMap{
    max-width:1100px;
    margin:0 auto;
    overflow-x:auto;
}

.weather-stage{
    max-width:860px;
    margin:0 auto;
}

.weather-grid-wrap{
    display:flex;
    justify-content:center;
    overflow-x:auto;
    padding-bottom:8px;
}

.weather-grid-panel{
    display:flex;
    flex-direction:column;
    gap:14px;
    align-items:center;
}

.weather-legend-card,
.weather-summary-card{
    max-width:860px;
    margin:14px auto 0;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    background:
        radial-gradient(circle at 10% 100%, rgba(0,255,136,0.08), transparent 28%),
        radial-gradient(circle at 90% 100%, rgba(255,200,64,0.06), transparent 22%),
        linear-gradient(180deg, rgba(10,12,18,0.94) 0%, rgba(7,9,13,0.98) 100%);
    padding:16px 18px;
    box-shadow:0 12px 34px rgba(0,0,0,0.28);
}

.weather-mode-title,
.weather-legend-title{
    font-size:11px;
    letter-spacing:0.16em;
    color:#7f8792;
    text-transform:uppercase;
    margin-bottom:10px;
}

.weather-mode-buttons{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.weather-mode-buttons button{
    padding:10px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.10);
    background:rgba(255,255,255,0.04);
    color:#dbe2ea;
    font-size:13px;
    transition:all 0.18s ease;
}

.weather-mode-buttons button.active{
    background:linear-gradient(90deg, rgba(0,255,136,0.88), rgba(255,210,80,0.82));
    color:#04110d;
    border-color:transparent;
    box-shadow:0 0 18px rgba(0,255,136,0.20);
}

.weather-copy{
    font-size:13px;
    line-height:1.65;
    color:#aeb7c3;
}

.weather-copy b{
    color:#f3f4f6;
}

.weather-dots{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin:12px 0 8px;
}

.weather-dot-item{
    display:flex;
    align-items:center;
    gap:8px;
    color:#d6dde7;
    font-size:13px;
}

.weather-dot{
    width:10px;
    height:10px;
    border-radius:999px;
    box-shadow:0 0 10px rgba(255,255,255,0.12);
}

.weather-popup{
    position:fixed;
    background:
        radial-gradient(circle at 10% 100%, rgba(0,255,136,0.08), transparent 34%),
        radial-gradient(circle at 90% 100%, rgba(255,210,80,0.08), transparent 26%),
        linear-gradient(180deg, rgba(11,13,18,0.98) 0%, rgba(6,8,12,0.98) 100%);
    color:#f3f4f6;
    padding:12px;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    font-size:12px;
    z-index:9999;
    display:none;
    max-width:280px;
    min-width:220px;
    pointer-events:auto;
    box-shadow:0 16px 40px rgba(0,0,0,0.38);
    backdrop-filter:blur(8px);
}

.weather-summary-top{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:14px;
}

.weather-summary-pill,
.metabolic-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    background:rgba(255,255,255,0.03);
    color:#dbe2ea;
    font-size:12px;
}

.weather-summary-main{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.weather-summary-block{
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    background:rgba(255,255,255,0.03);
    padding:14px;
}

.weather-summary-label{
    font-size:11px;
    letter-spacing:0.12em;
    color:#7f8792;
    text-transform:uppercase;
    margin-bottom:8px;
}

.weather-summary-value{
    font-size:15px;
    line-height:1.65;
    color:#f3f4f6;
}

.weather-summary-meta{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    margin-top:14px;
    font-size:12px;
    color:#9aa4b2;
}

/* ATTRACTOR / INTERACTION */
.attr-panel{
    max-width:860px;
    margin:0 auto;
    padding:16px;
    color:#e5e7eb;
    font-family:Arial, sans-serif;
}

.attr-header{
    margin-bottom:14px;
    text-align:center;
}

.attr-headline{
    font-size:26px;
    font-weight:700;
    margin-bottom:6px;
    color:#ffffff;
}

.attr-subline{
    font-size:14px;
    color:#a3a3a3;
    line-height:1.5;
}

.attr-advice{
    margin:0 auto 18px;
    max-width:760px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:12px 14px;
    text-align:center;
    font-size:15px;
    line-height:1.5;
    color:#d4d4d4;
}

.attr-sections{
    display:grid;
    grid-template-columns:repeat(2, minmax(260px, 1fr));
    gap:14px;
}

.attr-box{
    background:rgba(255,255,255,0.035);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    padding:14px;
    text-align:left;
}

.attr-title{
    font-size:17px;
    font-weight:700;
    margin-bottom:10px;
    color:#ffffff;
}

.positive-title{
    color:#86efac;
}

.negative-title{
    color:#fca5a5;
}

.attr-item{
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.attr-item:last-child{
    border-bottom:none;
}

.attr-item.positive .attr-name{
    color:#86efac;
}

.attr-item.negative .attr-name{
    color:#fca5a5;
}

.attr-name{
    font-size:15px;
    font-weight:600;
    margin-bottom:4px;
}

.attr-meta{
    font-size:13px;
    color:#9ca3af;
    line-height:1.4;
}

.attr-empty{
    color:#6b7280;
    font-size:14px;
}

/* NETWORK / COLLECTIVE / SERIES SIZE */
#seriesBlock,
#networkMap,
#collective{
    max-width:860px;
    margin:0 auto;
}

/* LOG TOOLS */
.tools-actions{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:14px;
}

.tools-actions button{
    padding:10px 14px;
    border:1px solid #333;
    background:#0b0b0b;
    color:#fff;
    border-radius:10px;
    font-size:13px;
}

#timeControls{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-bottom:14px;
    flex-wrap:wrap;
}

#replaySlider{
    width:min(760px, 100%);
}

.log-box{
    display:none;
    max-width:860px;
    margin:0 auto;
    border:1px solid #222;
    border-radius:12px;
    background:#050505;
    padding:12px;
    text-align:left;
}

.snapshot-box{
    display:none;
    max-width:860px;
    margin:14px auto 0;
    border:1px solid #222;
    border-radius:12px;
    background:#050505;
    padding:12px;
    text-align:left;
}

.log-box-title,
.snapshot-box-title{
    color:#9ca3af;
    font-size:12px;
    margin-bottom:10px;
}

#logStream,
#snapshotStream{
    max-height:340px;
    overflow:auto;
    text-align:left;
    font-family:monospace;
    font-size:12px;
    line-height:1.45;
    color:#d1d5db;
    background:#020202;
    border:1px solid #1f2937;
    border-radius:10px;
    padding:10px;
}

/* UTILS */
.mtos-hidden{
    display:none !important;
}

/* FULL MODE FORCE */
body.full-mode .mtos-top-cards{
    display:grid !important;
    grid-template-columns:repeat(4, minmax(0, 1fr)) !important;
    gap:12px;
    grid-auto-rows:1fr;
}

body.full-mode .mtos-lite-panel,
body.full-mode .mtos-panel,
body.full-mode .mtos-container{
    display:block !important;
}

body.full-mode .mtos-card{
    min-height:220px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* RESPONSIVE */
@media (max-width: 980px){
    .mtos-top-cards{
        grid-template-columns:repeat(2, minmax(0, 1fr)) !important;
    }
}

@media (max-width: 900px){
    .app-shell{
        width:min(100vw - 24px, var(--content-width));
    }

    .human-grid,
    .mtos-lite-grid,
    .weather-summary-main,
    .attr-sections{
        grid-template-columns:1fr;
    }

    .human-main{
        font-size:22px;
    }

    .human-bar-row{
        grid-template-columns:90px 1fr 44px;
    }

    .human-history-row{
        grid-template-columns:78px 1fr;
    }

    .human-history-mode{
        grid-column:1 / -1;
        padding-left:88px;
    }

    #humanLayer{
        padding:16px 22px;
    }

    .human-shell{
        padding:14px 18px;
    }

    .weather-shell,
    #collective,
    #seriesBlock,
    #interactionAnalysis,
    #attractorMap{
        display:none;
    }
}

@media (max-width: 760px){
    .mtos-top-cards{
        grid-template-columns:1fr !important;
    }
}

@media (max-width: 560px){
    .app-shell{
        width:min(100vw - 18px, var(--content-width));
    }

    .controls-panel{
        flex-direction:column;
        align-items:center;
        gap:10px;
    }

    .controls-panel input,
    .controls-panel button{
        width:min(320px, 100%);
    }

        font-size:20px;
    }

    .weather-legend-card,
    .weather-summary-card{

        padding:14px;

        width:100%;
        max-width:240px;
    }

    #humanLayer{
        padding:14px 14px;
    }

    .human-shell{
        margin:14px auto;
        padding:12px 14px;
    }
}
</style>
</head>

<body>

<div class="mayan-border mayan-left"></div>
<div class="mayan-border mayan-right"></div>

<div id="app">
    <div class="app-shell">

        <header class="topbar">
            <div class="mtos-header">
    <img src="mtos-icon.png" class="mtos-logo" alt="MTOS">
</div>

<div class="mtos-about">
    <div class="mtos-about-title" data-i18n="mtos_about_title"></div>
    <div class="mtos-about-text">
        <div data-i18n="mtos_about_what"></div>
        <div data-i18n="mtos_about_how"></div>
        <div data-i18n="mtos_about_essence"></div>
    </div>
</div>

            <div class="controls-panel">
                <input id="name" data-i18n="name" placeholder="">
                <input id="year" data-i18n="year" placeholder="">
                <input id="month" data-i18n="month" placeholder="">
                <input id="day" data-i18n="day" placeholder="">
                <button type="button" onclick="runMTOS()" data-i18n="start_btn"></button>
            </div>

            <div class="view-switch">
                <button id="viewLiteBtn" type="button" onclick="setMTOSViewMode('lite')">LITE</button>
                <button id="viewFullBtn" type="button" onclick="setMTOSViewMode('full')">FULL</button>
            </div>

            <div class="lang-switch">
                <button id="langEnBtn" type="button" onclick="setMTOSLang('en')">EN</button>
                <button id="langRuBtn" type="button" onclick="setMTOSLang('ru')">RU</button>
            </div>
        </header>

        <section id="todayBlock" class="hero-panel"></section>
        <div id="todayPanel"></div>

        <section id="humanLayer" class="mayan-card human-shell"></section>

        <section class="mayan-card research-block">
            <div class="section-title" id="systemEventsTitle" data-i18n="systemEventsTitle"></div>
            <div id="mtosEventPanel"></div>
        </section>

        <section class="mayan-card research-block">
            <div class="section-title" id="systemDecisionTitle" data-i18n="systemDecisionTitle"></div>
            <div id="mtosDecisionPanel"></div>
        </section>

        <section class="mayan-card">
            <div id="mtosDecisionMetricsPanel"></div>
        </section>

        <section class="mayan-card">
            <div id="mtosTargetsPanel"></div>
        </section>

        <section class="mayan-card research-block">
            <div id="fieldTensionPanel"></div>
        </section>

        <section class="mayan-card research-block">
            <div id="actionTracePanel"></div>
        </section>

        <section class="mayan-card weather-shell research-block">
            <div class="weather-title" id="weatherTitle"></div>
            <div id="weatherMap"></div>
        </section>

        <section class="mayan-card research-block">
            <div class="section-title" data-i18n="network"></div>
            <div id="networkMap"></div>
        </section>

        <section class="mayan-card research-block">
            <div class="section-title" id="collectiveSectionTitle" data-i18n="collectiveSectionTitle"></div>
            <div id="collective"></div>
        </section>

        <section class="mayan-card research-block">
    <div class="section-title" id="fieldSectionTitle" data-i18n="fieldSectionTitle"></div>
    <div id="fieldMap"></div>
    <div id="fieldLegend" class="weather-legend-card" style="margin-top:14px;"></div>
</section>

        <section class="mayan-card research-block">
            <div class="section-title" id="attractorSectionTitle" data-i18n="attractorSectionTitle"></div>
            <div id="attractorMap" style="display:none;"></div>
            <div id="interactionAnalysis"></div>
        </section>

        <section class="mayan-card research-block">
            <div class="section-title" id="historyEfficiencySectionTitle" data-i18n="history_efficiency"></div>
            <div id="historyEfficiencyPanel"></div>
        </section>

        <section class="mayan-card research-block">
            <div class="section-title" id="seriesSectionTitle" data-i18n="seriesSectionTitle"></div>
            <div id="seriesBlock"></div>
        </section>

        <section class="mayan-card research-block">
            <div class="section-title" id="toolsSectionTitle" data-i18n="toolsSectionTitle"></div>

            <div class="tools-actions">
                <button type="button" onclick="exportLog()">EXPORT EVENT LOG</button>
                <button type="button" onclick="showMTOSLogs()">SHOW LOGS</button>
                <button type="button" onclick="hideMTOSLogs()">HIDE LOGS</button>
                <button type="button" onclick="clearMTOSLogs()">CLEAR LOGS</button>
                <button type="button" onclick="showDailySnapshots()">SHOW DAILY SNAPSHOTS</button>
            </div>

            <div id="timeControls"></div>

            <div style="max-width:860px; margin:0 auto 14px; text-align:center;">
                <input
                    id="replaySlider"
                    type="range"
                    min="0"
                    max="0"
                    value="0"
                    oninput="replaySeek(this.value)"
                >
            </div>

            <div id="logPanel" class="log-box">
                <div class="log-box-title">Event log stream</div>
                <div id="logStream"></div>
            </div>

            <div id="snapshotPanel" class="snapshot-box">
                <div class="snapshot-box-title">Daily snapshots</div>
                <div id="snapshotStream"></div>
            </div>
        </section>

    </div>
</div>

<script type="module">
import { initMTOS, runMTOS } from "./js/main.js";
import { replaySeek } from "./js/replay.js";

window.initMTOS = initMTOS;
window.runMTOS = runMTOS;
window.replaySeek = replaySeek;

window.showMTOSLogs = function(){
    const panel = document.getElementById("logPanel");
    if(panel) panel.style.display = "block";
};

window.hideMTOSLogs = function(){
    const panel = document.getElementById("logPanel");
    if(panel) panel.style.display = "none";
};

window.clearMTOSLogs = function(){
    localStorage.removeItem("mtos_log");
    window.MTOS_LOG = [];

    const logStream = document.getElementById("logStream");
    if(logStream) logStream.innerHTML = "";

    const snapshotStream = document.getElementById("snapshotStream");
    if(snapshotStream) snapshotStream.innerHTML = "";
};

window.showDailySnapshots = function(){
    const panel = document.getElementById("snapshotPanel");
    const stream = document.getElementById("snapshotStream");

    if(panel) panel.style.display = "block";
    if(!stream) return;

    let rows = [];
    try{
        rows = JSON.parse(localStorage.getItem("mtos_daily_snapshots") || "[]");
        if(!Array.isArray(rows)) rows = [];
    }catch(e){
        rows = [];
    }

    if(!rows.length){
        stream.innerHTML = '<div style="color:#888;">No daily snapshots yet</div>';
        return;
    }

    stream.innerHTML = rows
        .slice()
        .reverse()
        .map(row => {
            return `
                <div style="padding:8px 0;border-bottom:1px solid #111;">
                    <div><b>${row.day || "?"}</b> · ${row.name || "?"}</div>
                    <div>userKin: ${row.userKin ?? "?"} · todayKin: ${row.todayKin ?? "?"}</div>
                    <div>mode: ${row.recommendedMode ?? "?"} · label: ${row.dayLabel ?? "?"}</div>
                    <div>attention: ${Number(row.attention ?? 0).toFixed(2)} · entropy: ${Number(row.entropy ?? 0).toFixed(2)} · predictability: ${Number(row.predictability ?? 0).toFixed(2)}</div>
                </div>
            `;
        })
        .join("");
};

initMTOS();
</script>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<script>
window.applyStaticTranslations = function(){
    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        const value = t(key);

        if("placeholder" in el && el.tagName !== "BUTTON"){
            el.placeholder = value;
        }else{
            el.innerHTML = value;
        }
    });
};
</script>

<script>
const initialLang =
    (typeof loadMTOSLang === "function" ? loadMTOSLang() : null) ||
    localStorage.getItem("mtos_lang_v1") ||
    "en";

setMTOSLang(initialLang === "ru" ? "ru" : "en");
applyStaticTranslations();
</script>

</body>
</html>
