<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTOS FULL SYSTEM</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{
    background:#111;
    color:#eee;
    font-family:Arial;
    text-align:center;
}

.map{
    margin:20px auto;
    width:720px;
}

.block{
    margin:40px 0;
}
</style>
</head>

<body>

<h1>MTOS FULL SYSTEM</h1>

<input id="name" placeholder="Name">
<input id="year" placeholder="Year">
<input id="month" placeholder="Month">
<input id="day" placeholder="Day">

<br><br>
<button id="runBtn">RUN</button>

<div id="mtosSummary" style="
    margin:20px;
    text-align:center;
    font-family:monospace;
    line-height:1.6;
"></div>

<div id="timeControls" style="margin:20px;"></div>

<div id="status">init...</div>

<div class="block">
<h2>Weather</h2>
<div id="weatherMap" class="map"></div>
</div>

<div class="block">
<h2>Global</h2>
<div id="globalKinMap" class="map"></div>
</div>

<div class="block">
<h2>Pressure</h2>
<div id="pressureMap" class="map"></div>
<div id="pressureGradientMap" class="map"></div>
</div>

<div class="block">
<h2>Attractor</h2>
<div id="attractorMap" class="map"></div>
</div>

<div class="block">
<h2>Phase + Wave</h2>
<div id="phaseMap" class="map"></div>
<div id="waveMap" class="map"></div>
<div id="climateMap" class="map"></div>
</div>

<div class="block">
<h2>Series</h2>
<div id="series7"></div>
<div id="series30"></div>
<div id="series260"></div>
</div>

<div class="block">
<h2>Phase Space</h2>
<div id="phaseSpace"></div>
</div>

<div class="block">
<h2>Network</h2>
<div id="networkMap"></div>
</div>

<div class="block">
<h2>Collective</h2>
<div id="collectiveMap"></div>
</div>

<div class="block">
<h2>Activity</h2>
<div id="activityMap" class="map"></div>
</div>

<script type="module">
import { initMTOS, runMTOS } from "./js/main.js"

document.getElementById("runBtn").onclick = runMTOS
initMTOS()
</script>

</body>
</html>
