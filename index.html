<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTOS Scientific Dashboard</title>

<!-- PYODIDE -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{
    background:#111;
    color:#eee;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

.container{
    margin:40px auto;
    width:800px;
}

input{
    width:120px;
    padding:8px;
    margin:5px;
    background:#222;
    color:#eee;
    border:1px solid #555;
}

button{
    padding:10px 20px;
    background:#444;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#666;
}

#status{
    margin-top:10px;
    color:#0f0;
}

/* MAPS */

.map{
    margin:40px auto;
    width:700px;
}

/* GRID CELLS */

.cell{
    width:12px;
    height:12px;
}
</style>
</head>

<body>

<h1>MTOS Scientific Dashboard</h1>

<div class="container">

    <div>
        <input id="name" placeholder="Name">
        <input id="year" placeholder="Year">
        <input id="month" placeholder="Month">
        <input id="day" placeholder="Day">
    </div>

    <button id="runBtn">RUN</button>

    <div id="status">init...</div>

</div>

<!-- MAPS -->

<h2>260 Kin Cognitive Weather</h2>
<div id="weatherMap" class="map"></div>

<h2>Global Kin Distribution</h2>
<div id="globalKinMap" class="map"></div>

<h2>Pressure Map</h2>
<div id="pressureMap" class="map"></div>

<!-- MAIN SCRIPT -->

<script type="module">

import { initMTOS, runMTOS } from "./js/main.js"

document.getElementById("runBtn").onclick = runMTOS

initMTOS()

</script>

</body>
</html>
