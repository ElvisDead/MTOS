```html
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>MTOS Scientific Dashboard</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#111;
color:#eee;
font-family:Arial;
text-align:center;
padding:40px;
}

section{
margin-top:50px;
}

input{
padding:10px;
margin:5px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

canvas{
background:#000;
margin:auto;
display:block;
}

#state{
font-size:18px;
margin-top:20px;
}

.metric{
margin:10px;
font-size:18px;
}

#kinmap{
width:520px;
margin:auto;
}

.cell{
width:10px;
height:10px;
display:inline-block;
margin:1px;
}

.heatmap{
margin:auto;
display:grid;
grid-gap:2px;
justify-content:center;
}

</style>

</head>

<body>

<h1>MTOS Scientific Dashboard</h1>
<p>Metabolic Tzolkin Operating System</p>

<section>

<h2>User</h2>

<input id="name" placeholder="name">
<input id="year" placeholder="year">
<input id="month" placeholder="month">
<input id="day" placeholder="day">

<br><br>

<button onclick="run()">Run MTOS</button>

</section>

<section>

<h2>Current Cognitive State</h2>
<div id="state"></div>

</section>

<section>

<h2>Forecast</h2>

<h3>7 days</h3>
<canvas id="chart7" width="700" height="200"></canvas>

<h3>30 days</h3>
<canvas id="chart30" width="700" height="200"></canvas>

</section>

<section>

<h2>System Metrics</h2>
<div id="metrics"></div>

</section>

<section>

<h2>260 Kin Cognitive Weather</h2>
<div id="kinmap"></div>

</section>

<section>

<h2>Climate Atlas</h2>
<div id="atlas" class="heatmap"></div>

</section>

<section>

<h2>Attractor Map</h2>
<div id="attractor" class="heatmap"></div>

</section>

<section>

<h2>Wave Structure (13×20)</h2>
<div id="wave" class="heatmap"></div>

</section>

<script>

let pyodideReady = loadPyodide()

async function run(){

const pyodide = await pyodideReady

await pyodide.loadPackage("numpy")

let name=document.getElementById("name").value
let year=parseInt(document.getElementById("year").value)
let month=parseInt(document.getElementById("month").value)
let day=parseInt(document.getElementById("day").value)

let engine=await fetch("MTOS_Engine.py").then(r=>r.text())

pyodide.runPython(engine)

pyodide.globals.set("name",name)
pyodide.globals.set("year",year)
pyodide.globals.set("month",month)
pyodide.globals.set("day",day)

let result=pyodide.runPython(`
run_mtos(name,year,month,day)
`)

let data = JSON.parse(result)

document.getElementById("state").innerHTML=
`
Kin: ${data.kin}<br>
Seal: ${data.seal}<br>
Tone: ${data.tone}<br>
Attention: ${data.attention.toFixed(3)}<br>
State: ${data.state}
`

document.getElementById("metrics").innerHTML=
`
<div class="metric">Entropy: ${data.entropy.toFixed(3)}</div>
<div class="metric">Chaos: ${data.chaos.toFixed(4)}</div>
<div class="metric">Lyapunov: ${data.lyapunov.toFixed(4)}</div>
<div class="metric">Predictability: ${data.predictability}</div>
`

let series7 = pyodide.runPython(`
mtos_series(name,year,month,day,7)
`).toJs()

let series30 = pyodide.runPython(`
mtos_series(name,year,month,day,30)
`).toJs()

drawChart("chart7",series7,"7 day forecast")
drawChart("chart30",series30,"30 day forecast")

let weather = pyodide.runPython(`
mtos_260_weather(name,year,month,day)
`).toJs()

drawKinMap(weather)

let atlas = pyodide.runPython(`mtos_climate_atlas()`).toJs()
drawHeatmap("atlas",atlas,20)

let attractor = pyodide.runPython(`mtos_attractor_map()`).toJs()
drawHeatmap("attractor",attractor,20)

let wave = pyodide.runPython(`mtos_wave_structure()`).toJs()
drawHeatmap("wave",wave,20)

}

function drawChart(id,data,label){

let ctx=document.getElementById(id)

new Chart(ctx,{
type:"line",
data:{
labels:data.map((_,i)=>i+1),
datasets:[{
label:label,
data:data,
borderColor:"cyan",
fill:false
}]
},
options:{
scales:{
y:{min:0,max:1}
}
}
})

}

function drawKinMap(weather){

let map=document.getElementById("kinmap")

map.innerHTML=""

weather.forEach(v=>{

let c=document.createElement("div")

let color="green"

if(v<0.35) color="red"
else if(v<0.55) color="orange"
else if(v<0.75) color="yellow"

c.className="cell"
c.style.background=color

map.appendChild(c)

})

}

function drawHeatmap(id,data,size){

let map=document.getElementById(id)

map.style.gridTemplateColumns=`repeat(${size},12px)`

map.innerHTML=""

data.forEach(v=>{

let c=document.createElement("div")

let color="blue"

if(v>0.6) color="green"
if(v>0.75) color="yellow"
if(v>0.9) color="red"

c.style.width="12px"
c.style.height="12px"
c.style.background=color

map.appendChild(c)

})

}

</script>

</body>
</html>
```
