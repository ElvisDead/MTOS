<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MTOS Engine</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #eaeaea;
        }

        #app {
            padding: 20px;
        }

        .controls {
            margin-bottom: 20px;
        }

        input, button {
            padding: 8px;
            margin-right: 5px;
        }

        canvas {
            border: 1px solid #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="app">

    <h1>MTOS Engine</h1>

    <div class="controls">
        <input id="name" placeholder="Name">
        <input id="year" type="number" placeholder="Year">
        <input id="month" type="number" placeholder="Month">
        <input id="day" type="number" placeholder="Day">
        <button id="runBtn">Run</button>
        <button id="exportBtn">Export JSON</button>
    </div>

    <canvas id="kinMap" width="300" height="300"></canvas>

</div>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<!-- MAIN ENTRY -->
<script type="module">

import { loadPyodideAndRun } from './js/pyodideLoader.js';
import { initApp } from './js/main.js';
import { validateMatrix } from './js/matrix.js';

async function boot() {

    const pyodide = await loadPyodideAndRun('./MTOS_Engine.py');

    window.pyodide = pyodide; // удобно для дебага

    initApp(pyodide);

}

boot();

</script>

</body>
</html>
